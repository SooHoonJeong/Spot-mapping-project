services:
  backend:
    build:
      context: ./backend
    container_name: spot-backend
    ports:
      - "${SERVER_PORT}:8080"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - spot-network

  db:
    image: postgres:15
    container_name: spot-db
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "${DB_EXTERNAL_PORT}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - spot-network

  redis:
    image: redis:7
    container_name: spot-redis
    env_file:
      - ./backend/.env
    ports:
      - "${REDIS_EXTERNAL_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - spot-network

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    env_file:
      - ./backend/.env
    ports:
      - "${PROMETHEUS_EXTERNAL_PORT}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - spot-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "${GRAFANA_EXTERNAL_PORT}:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - spot-network

networks:
  spot-network:

volumes:
  postgres-data:
  redis-data:
  grafana-data:
