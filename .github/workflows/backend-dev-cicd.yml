name: Backend Dev CI/CD

on:
    push:
        branches: [ "backend-dev" ]

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                java-version: '21'
                distribution: 'temurin'
            
            - name: Grant execute permission for gradlew
              working-directory: ./backend
              run: chmod +x gradlew
            
            - name: Build with Gradle
              working-directory: ./backend
              run: ./gradlew clean build -x test

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            # Springboot
            - name: Build and Push Docker Image
              uses: docker/build-push-action@v5
              with:
                context: ./backend
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/spot-backend:dev-latest
            
            # 프로메테우스
            - name: Build and Push Prometheus Image
              uses: docker/build-push-action@v5
              with:
                context: ./monitoring/prometheus
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/spot-prometheus:latest

            # 그라파나
            - name: Build and Push Grafana Image
              uses: docker/build-push-action@v5
              with:
                context: ./monitoring/grafana
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/spot-grafana:latest

            - name: Deploy to Dev Server
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.SERVER_HOST }}
                username: ${{ secrets.SERVER_USER }}
                key: ${{ secrets.SERVER_SSH_KEY }}
                port: ${{ secrets.SERVER_SSH_PORT }}
                script: |
                  cd ~/spot
                  docker compose pull backend prometheus grafana
                  docker compose up -d backend prometheus grafana
                  docker image prune -f

